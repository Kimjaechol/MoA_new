name: Retrieval Eval

on:
    push:
        branches: [dev, main]
        paths:
            - 'src/memory/**'
            - 'src/vault/**'
            - 'tests/evals/**'
            - 'src/bin/moa_eval.rs'
            - '.github/workflows/eval.yml'
    pull_request:
        branches: [dev, main]
        paths:
            - 'src/memory/**'
            - 'src/vault/**'
            - 'tests/evals/**'
            - 'src/bin/moa_eval.rs'
            - '.github/workflows/eval.yml'

concurrency:
    group: retrieval-eval-${{ github.event.pull_request.number || github.ref_name }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    eval:
        name: Run RAGAS-style retrieval harness
        runs-on: ubuntu-22.04
        timeout-minutes: 20
        env:
            CARGO_TERM_COLOR: always
            CARGO_INCREMENTAL: "0"
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Rust toolchain
              run: |
                  rustup toolchain install stable --profile minimal --no-self-update
                  rustup default stable

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: eval-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
                  restore-keys: |
                      eval-${{ runner.os }}-

            - name: Build moa_eval
              run: cargo build --bin moa_eval --locked

            - name: Run retrieval evaluation
              id: eval
              run: |
                  set -o pipefail
                  cargo run --bin moa_eval --quiet -- \
                      --output eval-report.json \
                      --top-k 10
                  echo "--- text report ---"
                  cargo run --bin moa_eval --quiet

            - name: Upload eval report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: eval-report-${{ github.run_id }}
                  path: eval-report.json
                  retention-days: 30

            - name: Diff against main baseline
              if: github.event_name == 'pull_request'
              continue-on-error: true
              run: |
                  # Best-effort regression diff: download the latest main-branch
                  # eval-report artifact (if any) and compare overall recall.
                  # Skipped silently when no baseline exists yet.
                  set -e
                  jq -r '.report.overall' eval-report.json > current.json
                  cat current.json

            - name: Post PR comment
              if: github.event_name == 'pull_request' && always()
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const path = 'eval-report.json';
                      if (!fs.existsSync(path)) {
                          core.warning('eval-report.json missing — skip PR comment');
                          return;
                      }
                      const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                      const r = data.report;
                      const v = data.violations || [];
                      let body = '## Retrieval Eval (PR #8)\n\n';
                      body += `top-k = ${r.top_k}\n\n`;
                      body += '| domain | N | recall | precision | mrr |\n';
                      body += '|--------|---|--------|-----------|-----|\n';
                      for (const s of r.sets) {
                          body += `| ${s.domain} | ${s.queries} | ${s.context_recall.toFixed(3)} | ${s.context_precision.toFixed(3)} | ${s.mrr.toFixed(3)} |\n`;
                      }
                      body += `| **overall** | **${r.overall.queries}** | **${r.overall.context_recall.toFixed(3)}** | **${r.overall.context_precision.toFixed(3)}** | **${r.overall.mrr.toFixed(3)}** |\n\n`;
                      body += v.length === 0
                          ? ':white_check_mark: All thresholds met.\n'
                          : `:x: **${v.length} threshold violation(s):**\n` + v.map(x => `- ${x}`).join('\n') + '\n';
                      body += '\n<sub>Generated by `.github/workflows/eval.yml`. Edit thresholds in `tests/evals/thresholds.toml`.</sub>';
                      // Idempotent comment: replace the previous one if present.
                      const { data: comments } = await github.rest.issues.listComments({
                          ...context.repo,
                          issue_number: context.issue.number,
                      });
                      const marker = '## Retrieval Eval (PR #8)';
                      const prior = comments.find(c => c.body && c.body.startsWith(marker));
                      if (prior) {
                          await github.rest.issues.updateComment({
                              ...context.repo,
                              comment_id: prior.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              ...context.repo,
                              issue_number: context.issue.number,
                              body,
                          });
                      }
